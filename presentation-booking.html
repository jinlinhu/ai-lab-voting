<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 拓边实验室 - 讲演预约系统</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; padding: 30px; background: rgba(30, 41, 59, 0.8); border-radius: 20px; border: 1px solid rgba(148, 163, 184, 0.2); }
        .header h1 { font-size: 2.5rem; background: linear-gradient(90deg, #60a5fa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .nav-links { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; background: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 8px; color: #60a5fa; text-decoration: none; font-weight: 600; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 20px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; background: linear-gradient(90deg, #60a5fa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .booking-form, .my-bookings { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 25px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-input, .form-select { width: 100%; padding: 10px 12px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(148, 163, 184, 0.2); border-radius: 8px; color: #f1f5f9; }
        .book-btn { width: 100%; padding: 12px; background: linear-gradient(90deg, #3b82f6, #2563eb); border: none; border-radius: 8px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
        
        .schedule-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .week-card { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 25px; border: 2px solid rgba(148, 163, 184, 0.1); }
        .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .time-slot { background: rgba(15, 23, 42, 0.8); border-radius: 10px; padding: 15px; margin-bottom: 10px; }
        
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(148, 163, 184, 0.2); color: #94a3b8; }
        
        .message { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; z-index: 1000; display: none; }
        .message.success { background: rgba(16, 185, 129, 0.9); color: white; }
        .message.error { background: rgba(239, 68, 68, 0.9); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 拓边实验室 - 讲演预约系统</h1>
            <p>从2026年4月23日开始，每周三进行讲演汇报。每次3人讲演，请选择合适的时间预约。</p>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">🏠 返回报名系统</a>
                <a href="scoring-system.html" class="nav-btn">⭐ 进入打分系统</a>
                <a href="AI Experiment-Activity Introduction.html" target="_blank" class="nav-btn">📖 活动介绍</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="total-slots">21</div><div>总讲演名额</div></div>
            <div class="stat-card"><div class="stat-value" id="booked-slots">0</div><div>已预约名额</div></div>
            <div class="stat-card"><div class="stat-value" id="remaining-slots">21</div><div>剩余名额</div></div>
        </div>

        <div class="booking-form">
            <h3>📅 预约讲演时间</h3>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="participant-name" class="form-input" placeholder="请输入您的姓名">
            </div>
            <div class="form-group">
                <label>选择讲演周次</label>
                <select id="booking-week" class="form-select">
                    <option value="">请选择周次</option>
                </select>
            </div>
            <div class="form-group">
                <label>选择讲演顺序</label>
                <select id="booking-slot" class="form-select">
                    <option value="">请选择顺序</option>
                    <option value="1">第1位讲演</option>
                    <option value="2">第2位讲演</option>
                    <option value="3">第3位讲演</option>
                </select>
            </div>
            <button class="book-btn" onclick="bookPresentation()">预约讲演</button>
        </div>

        <div class="my-bookings">
            <h3>📋 我的预约记录</h3>
            <div id="my-bookings-list" style="color: #94a3b8; text-align: center; padding: 20px;">暂无预约记录</div>
        </div>

        <h2>📅 讲演日程安排</h2>
        <div class="schedule-grid" id="scheduleGrid"></div>

        <div class="footer">
            <p>AI 拓边实验室 - 讲演预约系统 | 基于 Supabase + GitHub Pages</p>
            <p>© 2026 算法团队内部活动</p>
        </div>
    </div>

    <script>
        const PRESENTATION_WEEKS = [
            { id: 1, date: '2026-04-23', label: '第1周 (4月23日)' },
            { id: 2, date: '2026-05-07', label: '第2周 (5月7日)' },
            { id: 3, date: '2026-05-14', label: '第3周 (5月14日)' },
            { id: 4, date: '2026-05-21', label: '第4周 (5月21日)' },
            { id: 5, date: '2026-05-28', label: '第5周 (5月28日)' },
            { id: 6, date: '2026-06-04', label: '第6周 (6月4日)' }
        ];
        
        const VALID_NAMES = ["昌胜骐","陈华炎","陈玉林","成余刚","贺焱","胡金林","胡一帆","计国锋","蒋伟","孔超","刘健","刘煜","栾梦杰","闵于","钱建军","王昊俣","王省超","吴之祥","张文宇","周伟"];
        
        let supabaseClient = null;
        
        function showMessage(text, type = 'info') {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            msg.style.display = 'block';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }
        
        function loadConfig() {
            try {
                let url = localStorage.getItem('supabaseUrl') || 'https://mnxlsewwhczawwyjnexr.supabase.co';
                let key = localStorage.getItem('supabaseKey') || 'sb_publishable_82zAM1g-HhuDUIiYHytK_Q_q4CsUUnu';
                supabaseClient = window.supabase.createClient(url, key);
                loadBookings();
                return true;
            } catch (error) {
                showMessage('配置加载失败', 'error');
                return false;
            }
        }
        
        async function loadBookings() {
            if (!supabaseClient) return;
            try {
                const { data } = await supabaseClient.from('presentation_bookings').select('*').order('week_id').order('slot_number');
                updateSchedule(data || []);
                updateStats(data || []);
                updateMyBookings(data || []);
                populateWeekSelect();
            } catch (error) {
                console.error('加载失败:', error);
            }
        }
        
        function updateSchedule(bookings) {
            const grid = document.getElementById('scheduleGrid');
            grid.innerHTML = PRESENTATION_WEEKS.map(week => {
                const weekBookings = bookings.filter(b => b.week_id === week.id);
                const slots = [1,2,3].map(slot => {
                    const booking = weekBookings.find(b => b.slot_number === slot);
                    return booking ? 
                        `<div class="time-slot">第${slot}位: ${booking.participant_name} <button onclick="cancelBooking(${booking.id})" style="float:right;background:#ef4444;color:white;border:none;padding:2px 8px;border-radius:4px;font-size:12px;">取消</button></div>` :
                        `<div class="time-slot" style="color:#94a3b8;">第${slot}位: 等待预约</div>`;
                }).join('');
                return `<div class="week-card"><div class="week-header"><span>${week.label}</span><span>${weekBookings.length}/3</span></div>${slots}</div>`;
            }).join('');
        }
        
        function updateStats(bookings) {
            const total = 21;
            const booked = bookings.length;
            document.getElementById('total-slots').textContent = total;
            document.getElementById('booked-slots').textContent = booked;
            document.getElementById('remaining-slots').textContent = total - booked;
        }
        
        function updateMyBookings(bookings) {
            const name = document.getElementById('participant-name').value.trim();
            if (!name) return;
            const myBookings = bookings.filter(b => b.participant_name === name);
            const list = document.getElementById('my-bookings-list');
            list.innerHTML = myBookings.length ? myBookings.map(b => {
                const week = PRESENTATION_WEEKS.find(w => w.id === b.week_id);
                return `<div>${week?.label} - 第${b.slot_number}位讲演 <button onclick="cancelBooking(${b.id})" style="float:right;background:#ef4444;color:white;border:none;padding:2px 8px;border-radius:4px;">取消</button></div>`;
            }).join('') : '<div>暂无预约记录</div>';
        }
        
        function populateWeekSelect() {
            const select = document.getElementById('booking-week');
            select.innerHTML = '<option value="">请选择周次</option>' + PRESENTATION_WEEKS.map(w => `<option value="${w.id}">${w.label}</option>`).join('');
        }
        
        async function bookPresentation() {
            const name = document.getElementById('participant-name').value.trim();
            const weekId = parseInt(document.getElementById('booking-week').value);
            const slotNumber = parseInt(document.getElementById('booking-slot').value);
            
            if (!name || !VALID_NAMES.includes(name)) {
                showMessage('请输入有效的姓名', 'error'); return;
            }
            if (!weekId || !slotNumber) {
                showMessage('请选择周次和顺序', 'error'); return;
            }
            
            try {
                // 检查是否已预约
                const { data: existing } = await supabaseClient.from('presentation_bookings').select('id').eq('participant_name', name);
                if (existing.length > 0) {
                    showMessage('您已经预约过', 'error'); return;
                }
                
                // 检查时间段是否可用
                const { data: slotBookings } = await supabaseClient.from('presentation_bookings').select('id').eq('week_id', weekId).eq('slot_number', slotNumber);
                if (slotBookings.length > 0) {
                    showMessage('该时间段已被预约', 'error'); return;
                }
                
                // 检查本周是否已满
                const { data: weekBookings } = await supabaseClient.from('presentation_bookings').select('id').eq('week_id', weekId);
                if (weekBookings.length >= 3) {
                    showMessage('本周已满', 'error'); return;
                }
                
                // 创建预约
                await supabaseClient.from('presentation_bookings').insert([{
                    participant_name: name,
                    week_id: weekId,
                    slot_number: slotNumber,
                    booked_at: new Date().toISOString()
                }]);
                
                showMessage('预约成功!', 'success');
                loadBookings();
                
            } catch (error) {
                showMessage('预约失败: ' + error.message, 'error');
            }
        }
        
        async function cancelBooking(bookingId) {
            if (!confirm('确定取消预约?')) return;
            try {
                await supabaseClient.from('presentation_bookings').delete().eq('id', bookingId);
                showMessage('已取消', 'success');
                loadBookings();
            } catch (error) {
                showMessage('取消失败', 'error');
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            document.getElementById('participant-name').addEventListener('input', () => loadBookings());
        });
    </script>
</body>
</html>
