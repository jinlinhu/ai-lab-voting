<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 拓边实验室 - 云端投票报名系统（GitHub Pages版）</title>
    <!-- 引入 Supabase 客户端库 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; padding: 30px; background: rgba(30, 41, 59, 0.8); border-radius: 20px; border: 1px solid rgba(148, 163, 184, 0.2); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .header h1 { font-size: 2.5rem; background: linear-gradient(90deg, #60a5fa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .header p { font-size: 1.1rem; color: #94a3b8; max-width: 800px; margin: 0 auto; line-height: 1.6; }
        .rules { background: rgba(30, 41, 59, 0.8); border-radius: 15px; padding: 25px; margin-bottom: 30px; border-left: 4px solid #3b82f6; }
        .rules h3 { color: #60a5fa; margin-bottom: 15px; font-size: 1.3rem; }
        .rules ul { list-style: none; padding-left: 20px; }
        .rules li { margin-bottom: 8px; color: #cbd5e1; position: relative; padding-left: 25px; }
        .rules li:before { content: "•"; color: #3b82f6; font-size: 1.5rem; position: absolute; left: 0; top: -2px; }
        .themes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; align-items: stretch; }
        .theme-card { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 25px; border: 2px solid rgba(148, 163, 184, 0.1); display: flex; flex-direction: column; height: 100%; position: relative; min-height: 580px; }
        .theme-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        
        /* 固定位置区域 */
        .card-top-section { flex: 0 0 auto; }
        .card-middle-section { flex: 0 0 auto; margin-bottom: 20px; }
        .card-bottom-section { flex: 0 0 auto; }
        .theme-index { display: inline-block; background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; margin-bottom: 15px; }
        .theme-title { font-size: 1.4rem; color: #f1f5f9; margin-bottom: 10px; line-height: 1.3; }
        .theme-tag { display: inline-block; background: rgba(139, 92, 246, 0.2); color: #a78bfa; padding: 4px 10px; border-radius: 15px; font-size: 0.85rem; margin-bottom: 15px; }
        .theme-desc { color: #94a3b8; font-size: 0.95rem; line-height: 1.7; margin-bottom: 20px; height: 7.2em; overflow: hidden; }
        .capacity { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(148, 163, 184, 0.1); height: 50px; }
        .capacity span { color: #60a5fa; font-weight: 600; }
        .capacity-meter { width: 60%; height: 8px; background: rgba(148, 163, 184, 0.2); border-radius: 4px; overflow: hidden; }
        .capacity-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); border-radius: 4px; }
        .signup-form { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(148, 163, 184, 0.1); min-height: 140px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 10px 12px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(148, 163, 184, 0.2); border-radius: 8px; color: #f1f5f9; font-size: 0.95rem; }
        .signup-btn { width: 100%; padding: 12px; background: linear-gradient(90deg, #3b82f6, #2563eb); border: none; border-radius: 8px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .signup-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #4b5563; }
        .registrants-list { margin-top: 15px; max-height: 200px; overflow-y: auto; flex-grow: 1; min-height: 150px; }
        .registrant-item { padding: 10px; border-bottom: 1px solid rgba(148, 163, 184, 0.1); color: #cbd5e1; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .remove-btn { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; }
        .empty-message { color: #94a3b8; font-style: italic; text-align: center; padding: 20px; font-size: 0.9rem; }
        .full-badge { background: rgba(239, 68, 68, 0.2); color: #f87171; padding: 8px 12px; border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: 600; margin-top: 15px; }
        .control-panel { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 25px; margin-top: 30px; text-align: center; }
        .control-buttons { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #2563eb); color: white; }
        .btn-secondary { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; }
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(148, 163, 184, 0.2); color: #94a3b8; font-size: 0.9rem; }
        @media (max-width: 768px) { .header h1 { font-size: 2rem; } .themes-grid { grid-template-columns: 1fr; } .control-buttons { flex-direction: column; } }
        
        /* 消息提示 */
        .message { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; z-index: 1000; display: none; animation: slideDown 0.3s ease; }
        .message.success { background: rgba(16, 185, 129, 0.9); color: white; }
        .message.error { background: rgba(239, 68, 68, 0.9); color: white; }
        .message.info { background: rgba(59, 130, 246, 0.9); color: white; }
        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        
        /* 配置面板 */
        .config-panel { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 25px; margin-bottom: 30px; border: 2px solid rgba(59, 130, 246, 0.3); display: none; }
        .config-panel h3 { color: #60a5fa; margin-bottom: 15px; font-size: 1.3rem; }
        .config-input { width: 100%; padding: 10px 12px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(148, 163, 184, 0.2); border-radius: 8px; color: #f1f5f9; font-size: 0.95rem; margin-bottom: 15px; }
        .config-btn { padding: 10px 20px; background: linear-gradient(90deg, #3b82f6, #2563eb); border: none; border-radius: 8px; color: white; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        
        /* 加载动画 */
        .loader { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(148, 163, 184, 0.3); border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s ease-in-out infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 状态指示器 */
        .status-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status-online { background-color: #10b981; }
        .status-offline { background-color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 拓边实验室 - 云端投票报名系统</h1>
            <p>选择你感兴趣的研究主题进行报名，每个主题限5人参与。每人只能选择一个主题进行报名。</p>
            <p style="margin-top: 15px;">
                <a href="AI Experiment-Activity Introduction.html" target="_blank" style="color: #60a5fa; text-decoration: none; font-weight: 600; padding: 8px 16px; background: rgba(96, 165, 250, 0.1); border-radius: 8px; border: 1px solid rgba(96, 165, 250, 0.3);">
                    📖 查看活动详细介绍
                </a>
                <a href="presentation-booking-simple.html" target="_blank" style="color: #60a5fa; text-decoration: none; font-weight: 600; padding: 8px 16px; background: rgba(96, 165, 250, 0.1); border-radius: 8px; border: 1px solid rgba(96, 165, 250, 0.3); margin-left: 10px;">
                    📅 讲演预约系统
                </a>
                <a href="scoring-system.html" target="_blank" style="color: #60a5fa; text-decoration: none; font-weight: 600; padding: 8px 16px; background: rgba(96, 165, 250, 0.1); border-radius: 8px; border: 1px solid rgba(96, 165, 250, 0.3); margin-left: 10px;">
                    ⭐ 讲演打分系统
                </a>
            </p>
        </div>

        <!-- 配置面板（已预配置，默认隐藏） -->
        <div class="config-panel" id="configPanel">
            <h3>⚙️ Supabase 配置</h3>
            <p style="color: #94a3b8; margin-bottom: 15px; font-size: 0.95rem;">
                如需重新配置 Supabase 连接信息：
            </p>
            <div class="form-group">
                <label for="supabaseUrl">Supabase URL</label>
                <input type="text" id="supabaseUrl" class="config-input" placeholder="https://your-project.supabase.co">
            </div>
            <div class="form-group">
                <label for="supabaseKey">Supabase Anon Key</label>
                <input type="text" id="supabaseKey" class="config-input" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
            </div>
            <button class="config-btn" onclick="saveConfig()">保存配置</button>
        </div>



        <div class="themes-grid" id="themesGrid">
            <!-- 主题卡片将通过JavaScript动态生成 -->
        </div>

        <div class="control-panel">
            <h3>📊 数据管理</h3>
            <div class="control-buttons">
                <button class="btn btn-primary" onclick="exportData()">导出数据</button>
            </div>
            <div id="total-stats" style="margin-top: 20px; color: #94a3b8; font-size: 0.9rem;">
                总报名人数: <span id="total-count">0</span> / 20
            </div>

        </div>

        <div class="footer">
            <p>AI 拓边实验室 - 云端投票报名系统 | 基于 Supabase + GitHub Pages</p>
            <p>© 2026 算法团队内部活动</p>
        </div>
    </div>

    <script>
        // 应用配置
        const MAX_PARTICIPANTS = 5;
        const THEMES = [
            { id: 1, title: "云端识别", tag: "时空异常分析", desc: "利用用户上传的 GGA 信息，在云端识别导航欺骗与干扰，针对南京导航异常期间数据实现有效检测。" },
            { id: 2, title: "多源感知", tag: "端侧采集", desc: "引入 IMU 与磁力计，完成基础质量筛查与可视化，实现手机 app 的传感器采集和结果展示。" },
            { id: 3, title: "软件接收机", tag: "GPS 伪距跟踪", desc: "开发支持 GPS 伪距跟踪的软件接收机，实现可演示核心链路的软件接收机原型。" },
            { id: 4, title: "研发管理", tag: "个人项目经理", desc: "开发个人项目经理助手工具，支持任务梳理、进展追踪和日常记录，提升个人研发效率。" }
        ];
        
        // 合法的GNSS算法研发部成员姓名列表
        const VALID_NAMES = [
            "昌胜骐", "陈华炎", "陈玉林", "成余刚", "贺焱", 
            "胡金林", "胡一帆", "计国锋", "蒋伟", "孔超", 
            "刘健", "刘煜", "栾梦杰", "闵于", "钱建军", 
            "王昊俣", "王省超", "吴之祥", "张文宇", "周伟"
        ];

        // Supabase 客户端（使用不同的变量名避免冲突）
        let supabaseClient = null;
        let isConfigured = false;

        // 显示消息
        function showMessage(text, type = 'info') {
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            message.style.display = 'block';
            
            document.body.appendChild(message);
            
            setTimeout(() => {
                message.style.display = 'none';
                message.remove();
            }, 3000);
        }

        // 加载配置
        function loadConfig() {
            try {
                // 首先检查本地存储是否有配置
                let url = localStorage.getItem('supabaseUrl');
                let key = localStorage.getItem('supabaseKey');
                
                // 如果没有本地配置，使用预配置的值
                if (!url || !key) {
                    url = 'https://mnxlsewwhczawwyjnexr.supabase.co';
                    key = 'sb_publishable_82zAM1g-HhuDUIiYHytK_Q_q4CsUUnu';
                    
                    // 保存到本地存储，避免下次再配置
                    localStorage.setItem('supabaseUrl', url);
                    localStorage.setItem('supabaseKey', key);
                }
                
                if (url && key) {
                    // 初始化 Supabase 客户端
                    supabaseClient = window.supabase.createClient(url, key);
                    isConfigured = true;
                    
                    // 隐藏配置面板（已预配置，直接隐藏）
                    document.getElementById('configPanel').style.display = 'none';
                    
                    // 加载数据
                    loadData();
                    
                    // 设置实时订阅
                    setupRealtimeSubscription();
                    
                    return true;
                }
            } catch (error) {
                console.error('加载配置失败:', error);
                // 如果预配置失败，显示配置面板让用户手动输入
                document.getElementById('configPanel').style.display = 'block';
                document.getElementById('supabaseUrl').value = 'https://mnxlsewwhczawwyjnexr.supabase.co';
                document.getElementById('supabaseKey').value = 'sb_publishable_82zAM1g-HhuDUIiYHytK_Q_q4CsUUnu';
            }
            return false;
        }

        // 保存配置
        function saveConfig() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            
            if (!url || !key) {
                showMessage('请填写完整的配置信息', 'error');
                return;
            }
            
            if (!url.startsWith('https://') || !url.includes('.supabase.co')) {
                showMessage('Supabase URL 格式不正确', 'error');
                return;
            }
            
            try {
                localStorage.setItem('supabaseUrl', url);
                localStorage.setItem('supabaseKey', key);
                
                // 重新加载配置
                if (loadConfig()) {
                    showMessage('配置保存成功，正在重新连接数据库...', 'success');
                }
            } catch (error) {
                console.error('保存配置失败:', error);
                showMessage('保存配置失败', 'error');
            }
        }

        // 显示配置面板功能已移除（根据用户要求）

        // 从云端加载数据
        async function loadData() {
            if (!isConfigured || !supabaseClient) {
                showMessage('请先配置 Supabase 连接', 'error');
                return;
            }
            
            try {
                // 查询所有报名记录
                const { data, error } = await supabaseClient
                    .from('registrations')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    throw error;
                }
                
                // 按主题分组
                const themeParticipants = { 1: [], 2: [], 3: [], 4: [] };
                
                if (data) {
                    data.forEach(record => {
                        const themeId = record.theme_id;
                        if (themeParticipants[themeId]) {
                            themeParticipants[themeId].push({
                                id: record.id,
                                name: record.name,
                                date: new Date(record.created_at).toLocaleString('zh-CN')
                            });
                        }
                    });
                }
                
                // 更新界面
                updateUI(themeParticipants);
                
            } catch (error) {
                console.error('加载数据失败:', error);
                showMessage(`加载数据失败: ${error.message}`, 'error');
            }
        }

        // 报名到云端
        async function signup(themeId) {
            if (!isConfigured || !supabaseClient) {
                showMessage('请先配置 Supabase 连接', 'error');
                return;
            }
            
            const input = document.querySelector(`#name-${themeId}`);
            if (!input) return;
            
            const name = input.value.trim();
            if (!name) {
                showMessage('请输入姓名', 'error');
                return;
            }
            
            if (name.length > 20) {
                showMessage('姓名不能超过20个字符', 'error');
                return;
            }
            
            // 校验姓名是否为GNSS算法研发部成员
            if (!VALID_NAMES.includes(name)) {
                showMessage('你不是GNSS算法研发部成员', 'error');
                return;
            }
            
            try {
                // 检查是否已满
                const { data: currentData, error: countError } = await supabaseClient
                    .from('registrations')
                    .select('id')
                    .eq('theme_id', themeId);
                
                if (countError) throw countError;
                
                if (currentData.length >= MAX_PARTICIPANTS) {
                    showMessage('该主题报名已满', 'error');
                    return;
                }
                
                // 检查是否已经在其他Signal报名
                const { data: existingInOtherThemes, error: checkOtherError } = await supabaseClient
                    .from('registrations')
                    .select('theme_id')
                    .eq('name', name);
                
                if (checkOtherError) throw checkOtherError;
                
                if (existingInOtherThemes.length > 0) {
                    // 找到已经在哪个Signal报名
                    const existingThemeId = existingInOtherThemes[0].theme_id;
                    const themeName = THEMES.find(t => t.id === existingThemeId)?.title || `Signal ${existingThemeId}`;
                    showMessage(`您已在 ${themeName} 报名，每人只能选择一个主题`, 'error');
                    return;
                }
                
                // 检查是否在本主题重复报名（冗余检查）
                const { data: existingInSameTheme, error: checkSameError } = await supabaseClient
                    .from('registrations')
                    .select('id')
                    .eq('theme_id', themeId)
                    .eq('name', name);
                
                if (checkSameError) throw checkSameError;
                
                if (existingInSameTheme.length > 0) {
                    showMessage('该姓名已在本主题报名', 'error');
                    return;
                }
                
                // 插入新记录
                const { data, error } = await supabaseClient
                    .from('registrations')
                    .insert([
                        { theme_id: themeId, name: name }
                    ])
                    .select();
                
                if (error) throw error;
                
                // 保存报名ID到本地存储，用于后续取消
                if (data && data[0]) {
                    const registrationId = data[0].id;
                    const myRegistrations = JSON.parse(localStorage.getItem('myRegistrations') || '[]');
                    myRegistrations.push(registrationId);
                    localStorage.setItem('myRegistrations', JSON.stringify(myRegistrations));
                }
                
                // 清空输入框
                input.value = '';
                
                // 重新加载数据
                await loadData();
                
                showMessage('报名成功！', 'success');
                
            } catch (error) {
                console.error('报名失败:', error);
                showMessage(`报名失败: ${error.message}`, 'error');
            }
        }

        // 从云端取消报名
        async function removeParticipant(themeId, participantId) {
            if (!isConfigured || !supabaseClient) {
                showMessage('请先配置 Supabase 连接', 'error');
                return;
            }
            
            try {
                // 检查是否有权限取消（只能取消自己的报名）
                const myRegistrations = JSON.parse(localStorage.getItem('myRegistrations') || '[]');
                if (!myRegistrations.includes(participantId)) {
                    showMessage('只能取消自己的报名', 'error');
                    return;
                }
                
                // 查询参与者信息
                const { data: participantData, error: queryError } = await supabaseClient
                    .from('registrations')
                    .select('name')
                    .eq('id', participantId)
                    .single();
                
                if (queryError) throw queryError;
                
                if (!confirm(`确定要取消 ${participantData.name} 的报名吗？`)) {
                    return;
                }
                
                // 删除记录
                const { error } = await supabaseClient
                    .from('registrations')
                    .delete()
                    .eq('id', participantId);
                
                if (error) throw error;
                
                // 从本地存储中移除报名ID
                const updatedRegistrations = myRegistrations.filter(id => id !== participantId);
                localStorage.setItem('myRegistrations', JSON.stringify(updatedRegistrations));
                
                // 重新加载数据
                await loadData();
                
                showMessage(`已取消 ${participantData.name} 的报名`, 'success');
                
            } catch (error) {
                console.error('取消报名失败:', error);
                showMessage(`取消报名失败: ${error.message}`, 'error');
            }
        }

        // 保存输入框内容
        function saveInputValues() {
            const inputs = document.querySelectorAll('input[id^="name-"]');
            const inputValues = {};
            inputs.forEach(input => {
                if (input.value.trim()) {
                    inputValues[input.id] = input.value;
                }
            });
            sessionStorage.setItem('inputValues', JSON.stringify(inputValues));
        }

        // 恢复输入框内容
        function restoreInputValues() {
            const savedValues = JSON.parse(sessionStorage.getItem('inputValues') || '{}');
            Object.keys(savedValues).forEach(inputId => {
                const input = document.getElementById(inputId);
                if (input && !input.value) {
                    input.value = savedValues[inputId];
                }
            });
        }

        // 更新界面
        function updateUI(themeParticipants) {
            // 保存当前输入框内容
            saveInputValues();
            
            const grid = document.getElementById('themesGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            THEMES.forEach(theme => {
                const participants = themeParticipants[theme.id] || [];
                const remaining = MAX_PARTICIPANTS - participants.length;
                const isFull = remaining === 0;
                const percentage = (participants.length / MAX_PARTICIPANTS) * 100;
                
                // 构建报名者列表
                let registrantsHtml = '';
                if (participants.length === 0) {
                    registrantsHtml = '<div class="empty-message">暂无报名</div>';
                } else {
                    const myRegistrations = JSON.parse(localStorage.getItem('myRegistrations') || '[]');
                    registrantsHtml = participants.map(p => {
                        const isMyRegistration = myRegistrations.includes(p.id);
                        return `
                        <div class="registrant-item">
                            <span>${p.name}</span>
                            <div>
                                <small style="color: #94a3b8; margin-right: 10px;">${p.date}</small>
                                ${isMyRegistration ? `<button class="remove-btn" onclick="removeParticipant(${theme.id}, ${p.id})">取消</button>` : ''}
                            </div>
                        </div>
                    `}).join('');
                }
                
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.innerHTML = `
                    <div class="card-top-section">
                        <span class="theme-index">Signal 0${theme.id}</span>
                        <h3 class="theme-title">${theme.title}</h3>
                        <span class="theme-tag">${theme.tag}</span>
                    </div>
                    
                    <div class="card-middle-section">
                        <p class="theme-desc">${theme.desc}</p>
                    </div>
                    
                    <div class="card-bottom-section">
                        <div class="capacity">
                            <span>剩余名额: <span>${remaining}</span>/5</span>
                            <div class="capacity-meter">
                                <div class="capacity-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        
                        <div class="signup-form">
                            <div class="form-group">
                                <label for="name-${theme.id}">姓名</label>
                                <input type="text" id="name-${theme.id}" placeholder="请输入姓名" maxlength="20">
                            </div>
                            <button class="signup-btn" onclick="signup(${theme.id})" ${isFull ? 'disabled' : ''}>
                                ${isFull ? '已满' : '报名'}
                            </button>
                            ${isFull ? '<div class="full-badge">⚠️ 名额已满</div>' : ''}
                        </div>
                        
                        <div class="registrants-list">
                            ${registrantsHtml}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
            
            // 恢复输入框内容
            setTimeout(restoreInputValues, 10);
            
            // 更新统计
            updateTotalStats(themeParticipants);
        }

        // 更新统计
        function updateTotalStats(themeParticipants) {
            const total = Object.values(themeParticipants).reduce((sum, participants) => sum + participants.length, 0);
            const element = document.getElementById('total-count');
            if (element) {
                element.textContent = total;
            }
        }

        // 清除所有数据功能已移除（根据用户要求）

        // 导出数据
        async function exportData() {
            if (!isConfigured || !supabaseClient) {
                showMessage('请先配置 Supabase 连接', 'error');
                return;
            }
            
            try {
                // 查询所有数据
                const { data, error } = await supabaseClient
                    .from('registrations')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                // 按主题分组
                const exportData = {
                    themes: {},
                    exportDate: new Date().toISOString(),
                    total: data ? data.length : 0
                };
                
                // 按主题分组
                THEMES.forEach(theme => {
                    const themeData = data ? data.filter(item => item.theme_id === theme.id) : [];
                    exportData.themes[theme.id] = {
                        title: theme.title,
                        tag: theme.tag,
                        participants: themeData.map(item => ({
                            id: item.id,
                            name: item.name,
                            date: new Date(item.created_at).toLocaleString('zh-CN')
                        }))
                    };
                });
                
                // 下载
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ai-lab-云端报名数据-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showMessage('数据已导出', 'success');
                
            } catch (error) {
                console.error('导出数据失败:', error);
                showMessage(`导出数据失败: ${error.message}`, 'error');
            }
        }

        // 刷新数据功能已移除（根据用户要求）

        // 设置实时订阅
        function setupRealtimeSubscription() {
            if (!isConfigured || !supabaseClient) {
                console.log('Supabase未配置，跳过实时订阅');
                return;
            }
            
            try {
                // 订阅registrations表的实时变化
                const subscription = supabaseClient
                    .channel('registrations-changes')
                    .on(
                        'postgres_changes',
                        {
                            event: '*', // INSERT, UPDATE, DELETE
                            schema: 'public',
                            table: 'registrations'
                        },
                        (payload) => {
                            console.log('收到实时更新:', payload);
                            // 立即重新加载数据
                            loadData();
                        }
                    )
                    .subscribe();
                
                console.log('实时订阅已建立');
                
                // 清理订阅（页面卸载时）
                window.addEventListener('beforeunload', () => {
                    supabaseClient.removeChannel(subscription);
                });
                
            } catch (error) {
                console.error('建立实时订阅失败:', error);
            }
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 尝试加载配置
            if (!loadConfig()) {
                showMessage('请先配置 Supabase 连接信息', 'info');
            }
            
            // 添加回车提交
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && e.target.type === 'text' && e.target.id.startsWith('name-')) {
                    const themeId = e.target.id.split('-')[1];
                    signup(parseInt(themeId));
                }
            });
            
            // 监听输入框变化，自动保存内容
            document.addEventListener('input', function(e) {
                if (e.target.type === 'text' && e.target.id.startsWith('name-')) {
                    saveInputValues();
                }
            });
            
            // 移除自动刷新数据（解决输入框失焦问题）
            // 实时订阅已足够，不需要定时刷新
        });
    </script>
</body>
</html>
