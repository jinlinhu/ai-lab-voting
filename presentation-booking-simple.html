<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 拓边实验室 - 讲演预约系统</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; padding: 20px; background: #1e293b; border-radius: 15px; }
        .header h1 { font-size: 2rem; color: #60a5fa; margin-bottom: 10px; }
        .nav-links { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-btn { padding: 8px 16px; background: rgba(96, 165, 250, 0.1); border: 1px solid #3b82f6; border-radius: 6px; color: #60a5fa; text-decoration: none; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat { background: #1e293b; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 1.5rem; color: #60a5fa; font-weight: bold; }
        .stat-label { color: #94a3b8; font-size: 0.9rem; }
        
        .booking-form { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #cbd5e1; }
        input, select { width: 100%; padding: 8px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; }
        button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        .schedule { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .week { background: #1e293b; padding: 15px; border-radius: 10px; }
        .week-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .slot { background: #0f172a; padding: 10px; margin: 5px 0; border-radius: 6px; }
        
        .footer { text-align: center; margin-top: 30px; padding-top: 15px; border-top: 1px solid #334155; color: #94a3b8; }
        
        .message { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 6px; background: #10b981; color: white; display: none; }
        .error { background: #ef4444; }
        
        @media (max-width: 768px) { 
            .stats { grid-template-columns: repeat(2, 1fr); }
            .schedule { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 拓边实验室 - 讲演预约系统</h1>
            <p>从2026年4月23日开始，每周三进行讲演汇报。每次3人讲演。</p>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">返回报名系统</a>
                <a href="scoring-system.html" class="nav-btn">进入打分系统</a>
            </div>
        </div>

        <div class="stats">
            <div class="stat"><div class="stat-value" id="total-participants">20</div><div class="stat-label">总人数</div></div>
            <div class="stat"><div class="stat-value" id="total-slots">21</div><div class="stat-label">总名额</div></div>
            <div class="stat"><div class="stat-value" id="booked-slots">0</div><div class="stat-label">已预约</div></div>
            <div class="stat"><div class="stat-value" id="remaining-slots">21</div><div class="stat-label">剩余</div></div>
        </div>

        <div class="booking-form">
            <h3>预约讲演时间</h3>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="name" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>选择周次</label>
                <select id="week">
                    <option value="">请选择</option>
                </select>
            </div>
            <div class="form-group">
                <label>选择顺序</label>
                <select id="slot">
                    <option value="">请选择</option>
                    <option value="1">第1位</option>
                    <option value="2">第2位</option>
                    <option value="3">第3位</option>
                </select>
            </div>
            <button onclick="book()">预约讲演</button>
        </div>

        <h3>讲演日程安排</h3>
        <div class="schedule" id="schedule">
            <!-- 动态生成 -->
        </div>

        <div class="footer">
            <p>AI 拓边实验室 - 讲演预约系统</p>
            <p>© 2026 算法团队内部活动</p>
        </div>
    </div>

    <script>
        const WEEKS = [
            { id: 1, date: '2026-04-23', label: '第1周 (4月23日)' },
            { id: 2, date: '2026-04-30', label: '第2周 (4月30日)' },
            { id: 3, date: '2026-05-07', label: '第3周 (5月7日)' },
            { id: 4, date: '2026-05-14', label: '第4周 (5月14日)' },
            { id: 5, date: '2026-05-21', label: '第5周 (5月21日)' },
            { id: 6, date: '2026-05-28', label: '第6周 (5月28日)' },
            { id: 7, date: '2026-06-04', label: '第7周 (6月4日)' }
        ];
        
        const MEMBERS = [
            "昌胜骐", "陈华炎", "陈玉林", "成余刚", "贺焱", 
            "胡金林", "胡一帆", "计国锋", "蒋伟", "孔超", 
            "刘健", "刘煜", "栾梦杰", "闵于", "钱建军", 
            "王昊俣", "王省超", "吴之祥", "张文宇", "周伟"
        ];
        
        let supabase = null;
        
        function init() {
            const url = localStorage.getItem('supabaseUrl') || 'https://mnxlsewwhczawwyjnexr.supabase.co';
            const key = localStorage.getItem('supabaseKey') || 'sb_publishable_82zAM1g-HhuDUIiYHytK_Q_q4CsUUnu';
            supabase = window.supabase.createClient(url, key);
            loadData();
        }
        
        async function loadData() {
            if (!supabase) return;
            
            try {
                const { data } = await supabase
                    .from('presentation_bookings')
                    .select('*')
                    .order('week_id')
                    .order('slot_number');
                
                updateDisplay(data || []);
            } catch (err) {
                console.error(err);
            }
        }
        
        function updateDisplay(bookings) {
            // 更新统计
            document.getElementById('booked-slots').textContent = bookings.length;
            document.getElementById('remaining-slots').textContent = 21 - bookings.length;
            
            // 更新周次选择
            const weekSelect = document.getElementById('week');
            weekSelect.innerHTML = '<option value="">请选择</option>';
            WEEKS.forEach(w => {
                const option = document.createElement('option');
                option.value = w.id;
                option.textContent = w.label;
                weekSelect.appendChild(option);
            });
            
            // 更新日程显示
            const schedule = document.getElementById('schedule');
            schedule.innerHTML = '';
            
            WEEKS.forEach(week => {
                const weekBookings = bookings.filter(b => b.week_id === week.id);
                
                let slotsHtml = '';
                for (let i = 1; i <= 3; i++) {
                    const booking = weekBookings.find(b => b.slot_number === i);
                    slotsHtml += `
                        <div class="slot">
                            <div>第${i}位: ${booking ? booking.participant_name : '可预约'}</div>
                        </div>
                    `;
                }
                
                const weekDiv = document.createElement('div');
                weekDiv.className = 'week';
                weekDiv.innerHTML = `
                    <div class="week-header">
                        <strong>${week.label}</strong>
                        <span>${weekBookings.length}/3</span>
                    </div>
                    ${slotsHtml}
                `;
                schedule.appendChild(weekDiv);
            });
        }
        
        async function book() {
            const name = document.getElementById('name').value.trim();
            const weekId = document.getElementById('week').value;
            const slot = document.getElementById('slot').value;
            
            if (!name || !MEMBERS.includes(name)) {
                alert('请输入有效的成员姓名');
                return;
            }
            if (!weekId || !slot) {
                alert('请选择周次和顺序');
                return;
            }
            
            try {
                // 检查是否已预约
                const { data: existing } = await supabase
                    .from('presentation_bookings')
                    .select('id')
                    .eq('participant_name', name);
                
                if (existing.length > 0) {
                    alert('您已经预约过讲演时间');
                    return;
                }
                
                // 检查时间段是否可用
                const { data: slotBooked } = await supabase
                    .from('presentation_bookings')
                    .select('id')
                    .eq('week_id', weekId)
                    .eq('slot_number', slot);
                
                if (slotBooked.length > 0) {
                    alert('该时间段已被预约');
                    return;
                }
                
                // 创建预约
                await supabase
                    .from('presentation_bookings')
                    .insert([{
                        participant_name: name,
                        week_id: parseInt(weekId),
                        slot_number: parseInt(slot),
                        booked_at: new Date().toISOString()
                    }]);
                
                alert('预约成功！');
                loadData();
                
            } catch (err) {
                alert('预约失败: ' + err.message);
            }
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
