<!DOCTYPE html>
<!-- version10 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 拓边实验室 - 讲演打分系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; padding: 30px; background: rgba(30, 41, 59, 0.8); border-radius: 20px; border: 1px solid rgba(148, 163, 184, 0.2); }
        .header h1 { font-size: 2.5rem; background: linear-gradient(90deg, #60a5fa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .nav-links { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; background: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 8px; color: #60a5fa; text-decoration: none; font-weight: 600; }

        .tabs { display: flex; gap: 5px; margin-bottom: 30px; background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; background: transparent; border: none; color: #94a3b8; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
        .tab-btn.active { background: linear-gradient(90deg, #3b82f6, #2563eb); color: white; }
        .tab-btn.tab-disabled { opacity: 0.4; cursor: not-allowed; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .name-input { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 25px; margin-bottom: 30px; display: flex; gap: 15px; align-items: center; }
        .name-input input { flex: 1; padding: 12px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(148, 163, 184, 0.2); border-radius: 8px; color: #f1f5f9; font-size: 1rem; }
        .name-input button { padding: 12px 30px; background: linear-gradient(90deg, #3b82f6, #2563eb); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .current-user { background: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 8px; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .current-user button { padding: 6px 15px; background: transparent; border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 6px; color: #ef4444; cursor: pointer; font-size: 0.85rem; }

        .progress-bar { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 20px 25px; margin-bottom: 25px; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #94a3b8; }
        .progress-track { height: 10px; background: rgba(15, 23, 42, 0.8); border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #38bdf8); border-radius: 5px; transition: width 0.3s; }

        .scoring-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .score-card { background: rgba(30, 41, 59, 0.9); border-radius: 12px; padding: 20px; border: 2px solid rgba(148, 163, 184, 0.1); transition: all 0.2s; }
        .score-card.scored { border-color: rgba(16, 185, 129, 0.3); opacity: 0.85; }
        .score-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .score-card-name { font-weight: 600; font-size: 1.1rem; }
        .theme-tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .theme-1 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .theme-2 { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .theme-3 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .theme-4 { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .score-card-body { display: flex; justify-content: space-between; align-items: center; }
        .score-card-avg { font-size: 1.5rem; font-weight: 700; background: linear-gradient(90deg, #60a5fa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .score-card-count { color: #94a3b8; font-size: 0.85rem; }
        .score-btn { padding: 8px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 0.9rem; background: linear-gradient(90deg, #3b82f6, #2563eb); color: white; }
        .scored-label { padding: 8px 20px; border-radius: 8px; border: none; font-weight: 600; font-size: 0.9rem; background: rgba(16, 185, 129, 0.2); color: #10b981; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1e293b; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 20px; font-size: 1.3rem; }
        .dim-group { margin-bottom: 15px; }
        .dim-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; }
        .dim-group .score-selector { display: flex; gap: 8px; }
        .dim-group .score-opt { flex: 1; padding: 10px; text-align: center; border-radius: 8px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(148, 163, 184, 0.2); color: #94a3b8; cursor: pointer; transition: all 0.15s; }
        .dim-group .score-opt.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .dim-group .score-opt:hover { border-color: rgba(96, 165, 250, 0.5); }
        .modal .comment-input { width: 100%; padding: 10px; background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(148, 163, 184, 0.2); border-radius: 8px; color: #f1f5f9; margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
        .btn-cancel { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; }
        .btn-submit { background: linear-gradient(90deg, #3b82f6, #2563eb); color: white; }

        .progress-matrix { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 25px; margin-bottom: 25px; overflow-x: auto; }
        .matrix-table { width: 100%; border-collapse: collapse; }
        .matrix-table th, .matrix-table td { padding: 8px; text-align: center; font-size: 0.8rem; }
        .matrix-table th { background: rgba(15, 23, 42, 0.8); color: #94a3b8; }
        .matrix-table td.cell-done { background: rgba(16, 185, 129, 0.3); color: #10b981; }
        .matrix-table td.cell-self { background: rgba(148, 163, 184, 0.1); color: #475569; }
        .matrix-table td.cell-pending { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .matrix-table td.name-cell { text-align: left; background: rgba(15, 23, 42, 0.8); color: #e2e8f0; font-weight: 500; white-space: nowrap; }

        .ranking-section { background: rgba(30, 41, 59, 0.9); border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .ranking-section h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .rank-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(148, 163, 184, 0.1); flex-wrap: wrap; gap: 8px; }
        .rank-pos { width: 35px; font-weight: 700; font-size: 1.1rem; }
        .rank-pos.top1 { color: #fbbf24; }
        .rank-pos.top2 { color: #94a3b8; }
        .rank-pos.top3 { color: #d97706; }
        .rank-name { flex: 1; font-weight: 500; min-width: 80px; }
        .rank-theme { margin-right: 10px; }
        .rank-score { font-weight: 700; color: #60a5fa; min-width: 70px; text-align: right; }
        .rank-count { color: #94a3b8; margin-left: 5px; font-size: 0.85rem; }
        .rank-details { font-size: 0.8rem; color: #94a3b8; margin-left: 5px; word-break: keep-all; }

        .theme-filter { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .theme-filter-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(148, 163, 184, 0.2); background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.9rem; }
        .theme-filter-btn.active { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; color: #60a5fa; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(30, 41, 59, 0.9); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-box .val { font-size: 2rem; font-weight: 700; background: linear-gradient(90deg, #60a5fa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-box .label { color: #94a3b8; font-size: 0.85rem; margin-top: 5px; }

        .msg-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; z-index: 2000; display: none; }
        .msg-ok { background: rgba(16, 185, 129, 0.9); color: white; }
        .msg-err { background: rgba(239, 68, 68, 0.9); color: white; }

        .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .detail-card { background: rgba(15, 23, 42, 0.8); border-radius: 10px; padding: 15px; }
        .detail-card h4 { margin-bottom: 8px; color: #60a5fa; }
        .detail-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 3px 0; }
        .detail-row .dl { color: #94a3b8; }
        .detail-row .dv { color: #e2e8f0; font-weight: 500; }

        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(148, 163, 184, 0.2); color: #94a3b8; }
        @media (max-width: 768px) { .scoring-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } .name-input { flex-direction: column; } .rank-item { flex-direction: column; align-items: flex-start; } .rank-score { text-align: left; } }
        
        .error-banner { background: rgba(239, 68, 68, 0.2); border: 2px solid rgba(239, 68, 68, 0.5); border-radius: 12px; padding: 20px; margin-bottom: 25px; text-align: left; }
        .error-banner pre { background: #0f172a; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 0.8rem; margin-top: 10px; color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 拓边实验室 - 讲演打分系统</h1>
            <p>每位同学需对其他已分享的同学进行多维度评分</p>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">🏠 返回报名系统</a>
                <a href="presentation-booking.html" class="nav-btn">📅 进入预约系统</a>
            </div>
        </div>

        <div id="globalErrorArea" style="display:none;" class="error-banner"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('scoring')">打分</button>
            <button class="tab-btn" onclick="switchTab('progress')">进度</button>
            <button class="tab-btn tab-disabled" onclick="showRankingDisabled()">排名</button>
        </div>

        <div id="tab-scoring" class="tab-panel active">
            <div id="nameSection">
                <div class="name-input">
                    <input type="text" id="raterInput" placeholder="请输入您的姓名" list="nameList">
                    <datalist id="nameList"></datalist>
                    <button onclick="startScoring()">开始打分</button>
                </div>
            </div>
            <div id="scoringArea" style="display:none;">
                <div class="current-user">
                    <span>评分人：<strong id="raterDisplay"></strong></span>
                    <button onclick="doLogout()">退出</button>
                </div>
                <div class="progress-bar">
                    <div class="progress-header">
                        <span>评分进度</span>
                        <span id="progressLabel">0 / 0 已完成</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressBar" style="width:0%"></div>
                    </div>
                </div>
                <div class="scoring-grid" id="scoringGrid"></div>
            </div>
        </div>

        <div id="tab-progress" class="tab-panel">
            <div class="stats-row" id="progStats"></div>
            <div class="progress-matrix">
                <h3 style="margin-bottom:15px;">评分完成矩阵</h3>
                <p style="color:#94a3b8;font-size:0.85rem;margin-bottom:15px;">绿色=已评分，红色=未评分，灰色=自己</p>
                <div id="progMatrix"></div>
            </div>
            <div class="ranking-section">
                <h3>按主题统计</h3>
                <div id="themeStats"></div>
            </div>
        </div>

        <div id="tab-ranking" class="tab-panel">
            <div class="theme-filter">
                <button class="theme-filter-btn active" onclick="doFilter('all')">全部</button>
                <button class="theme-filter-btn" onclick="doFilter(1)">云端识别</button>
                <button class="theme-filter-btn" onclick="doFilter(2)">多源感知</button>
                <button class="theme-filter-btn" onclick="doFilter(3)">软件接收机</button>
                <button class="theme-filter-btn" onclick="doFilter(4)">研发管理</button>
            </div>
            <div class="ranking-section">
                <h3>综合排名（按总平均分）</h3>
                <div id="rankList"></div>
            </div>
            <div class="ranking-section">
                <h3>评分详情</h3>
                <div class="detail-grid" id="detailGrid"></div>
            </div>
        </div>

        <div class="footer">
            <p>AI 拓边实验室 - 讲演打分系统 | 基于 Supabase + GitHub Pages</p>
            <p>&copy; 2026 算法团队内部活动</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">给 XXX 打分</h3>
            <div id="modalBody"></div>
            <input type="text" class="comment-input" id="modalComment" placeholder="评语（可选）">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-submit" onclick="doSubmitScore()">提交</button>
            </div>
        </div>
    </div>

    <div class="msg-box" id="msgBox"></div>

    <script>
    // 成员列表与主题定义
    var MEMBERS = ["昌胜骐","陈华炎","陈玉林","成余刚","贺焱","胡金林","胡一帆","计国锋","蒋伟","孔超","刘健","刘煜","栾梦杰","闵于","钱建军","王昊俣","王省超","吴之祥","张文宇","周伟"];
    var THEMES = [
        { id: 1, title: "云端识别", tag: "时空异常分析" },
        { id: 2, title: "多源感知", tag: "端侧采集" },
        { id: 3, title: "软件接收机", tag: "GPS 伪距跟踪" },
        { id: 4, title: "研发管理", tag: "个人项目经理" }
    ];
    var DIMS = [
        { key: "content_quality", label: "内容深度", desc: "研究内容的专业性和深度", weight: 0.7 },
        { key: "presentation_skills", label: "表达清晰", desc: "演讲表达的清晰度和逻辑性", weight: 0.3 }
    ];
    var MAX_TOTAL = 10;

    var supabaseClient = null;
    var curRater = "";
    var scores = [];
    var bookings = [];
    var themeMap = {};
    var curPresenter = "";
    var curDimScores = {};
    var isDbReady = false;

    function showMsg(text, ok) {
        var el = document.getElementById("msgBox");
        el.textContent = text;
        el.className = "msg-box " + (ok ? "msg-ok" : "msg-err");
        el.style.display = "block";
        setTimeout(function() { el.style.display = "none"; }, 4000);
    }

    function showRankingDisabled() {
        showMsg("排名功能暂时不可用，等所有人完成分享后再开放", false);
    }

    function showGlobalError(title, details) {
        var area = document.getElementById("globalErrorArea");
        area.innerHTML = '<strong>⚠️ ' + title + '</strong><br><small>请根据以下信息联系管理员或按照指引操作</small><pre>' + details + '</pre>';
        area.style.display = "block";
    }

    function hideGlobalError() {
        var area = document.getElementById("globalErrorArea");
        area.style.display = "none";
        area.innerHTML = '';
    }

    // 与index.html完全一致的配置加载逻辑
    function initSupabase() {
        try {
            var url = localStorage.getItem("supabaseUrl");
            var key = localStorage.getItem("supabaseKey");
            if (!url || !key) {
                url = 'https://mnxlsewwhczawwyjnexr.supabase.co';
                key = 'sb_publishable_82zAM1g-HhuDUIiYHytK_Q_q4CsUUnu';
                localStorage.setItem("supabaseUrl", url);
                localStorage.setItem("supabaseKey", key);
            }
            if (window.supabase && window.supabase.createClient) {
                supabaseClient = window.supabase.createClient(url, key);
                console.log("Supabase 客户端初始化成功");
                return true;
            } else {
                throw new Error("Supabase 库未加载完成");
            }
        } catch (e) {
            console.error("Supabase 初始化失败", e);
            showMsg("数据库连接初始化失败: " + e.message, false);
            return false;
        }
    }

    // 测试基础连接 (使用 registrations 表，该表在报名系统中确认可用)
    async function testBaseConnection() {
        if (!supabaseClient) return false;
        try {
            var { error } = await supabaseClient.from("registrations").select("id", { count: "exact", head: true });
            if (error) {
                console.warn("基础连接测试失败", error);
                return false;
            }
            return true;
        } catch (e) {
            return false;
        }
    }

    // 核心数据加载
    async function loadData() {
        if (!supabaseClient) {
            showMsg("数据库未初始化", false);
            return false;
        }
        try {
            // 加载预约数据
            var r1 = await supabaseClient.from("presentation_bookings").select("*").order("week_id").order("slot_number");
            if (r1.error) {
                if (r1.error.code === "42P01") {
                    showGlobalError("缺少数据表: presentation_bookings", 
                        "请在你的 Supabase SQL 编辑器中执行以下语句创建表：\n\n" +
                        "CREATE TABLE presentation_bookings (\n  id SERIAL PRIMARY KEY,\n  week_id INT NOT NULL,\n  slot_number INT NOT NULL,\n  participant_name TEXT NOT NULL,\n  theme_id INT,\n  booked_at TIMESTAMP DEFAULT NOW()\n);\n\n" +
                        "ALTER TABLE presentation_bookings ENABLE ROW LEVEL SECURITY;\n" +
                        "CREATE POLICY \"允许所有人查看\" ON presentation_bookings FOR SELECT USING (true);\n" +
                        "CREATE POLICY \"允许所有人插入\" ON presentation_bookings FOR INSERT WITH CHECK (true);\n" +
                        "CREATE POLICY \"允许所有人更新删除\" ON presentation_bookings FOR UPDATE USING (true);");
                } else {
                    showMsg("加载预约表失败: " + r1.error.message, false);
                }
                return false;
            }
            bookings = r1.data || [];

            // 加载评分数据
            var r2 = await supabaseClient.from("presentation_scores").select("*");
            if (r2.error) {
                if (r2.error.code === "42P01") {
                    showGlobalError("缺少数据表: presentation_scores", 
                        "请在你的 Supabase SQL 编辑器中执行以下语句创建表：\n\n" +
                        "CREATE TABLE presentation_scores (\n  id SERIAL PRIMARY KEY,\n  rater_name TEXT NOT NULL,\n  presenter_name TEXT NOT NULL,\n  content_quality INT DEFAULT 0,\n  presentation_skills INT DEFAULT 0,\n  comment TEXT,\n  scored_at TIMESTAMP DEFAULT NOW()\n);\n\n" +
                        "ALTER TABLE presentation_scores ENABLE ROW LEVEL SECURITY;\n" +
                        "CREATE POLICY \"允许所有人查看评分\" ON presentation_scores FOR SELECT USING (true);\n" +
                        "CREATE POLICY \"允许所有人提交评分\" ON presentation_scores FOR INSERT WITH CHECK (true);\n\n" +
                        "-- 可选索引\nCREATE INDEX idx_scores_presenter ON presentation_scores(presenter_name);\nCREATE INDEX idx_scores_rater ON presentation_scores(rater_name);");
                } else {
                    showMsg("加载评分表失败: " + r2.error.message, false);
                }
                return false;
            }
            scores = r2.data || [];

            // 构建 presenter -> theme_id 映射 (从预约表)
            themeMap = {};
            bookings.forEach(function(b) {
                if (b.theme_id) themeMap[b.participant_name] = b.theme_id;
            });
            // 兼容：如果评分表中有theme信息但预约表缺失，也可以补充
            scores.forEach(function(s) {
                if (s.presenter_theme && !themeMap[s.presenter_name]) {
                    themeMap[s.presenter_name] = s.presenter_theme;
                }
            });

            hideGlobalError();
            isDbReady = true;
            return true;
        } catch (e) {
            console.error("数据加载异常", e);
            showMsg("数据加载异常: " + e.message, false);
            return false;
        }
    }

    function getPresented() {
        var s = new Set();
        bookings.forEach(function(b) { if(b.participant_name) s.add(b.participant_name); });
        return Array.from(s);
    }

    function getMyScored() {
        var m = {};
        scores.forEach(function(s) {
            if (s.rater_name === curRater) m[s.presenter_name] = s;
        });
        return m;
    }

    // 计算某位被评人的加权平均总分和维度均分
    function getPresenterAvg(name) {
        var ss = scores.filter(function(s) { return s.presenter_name === name; });
        if (!ss.length) return null;
        var totalSum = 0;
        var dimSum = { content_quality:0, presentation_skills:0 };
        ss.forEach(function(s) {
            var c = s.content_quality || 0;
            var p = s.presentation_skills || 0;
            totalSum += (c * 0.7 + p * 0.3);
            dimSum.content_quality += c;
            dimSum.presentation_skills += p;
        });
        var cnt = ss.length;
        return {
            avg: (totalSum / cnt).toFixed(1),
            count: cnt,
            dims: {
                content_quality: (dimSum.content_quality / cnt).toFixed(1),
                presentation_skills: (dimSum.presentation_skills / cnt).toFixed(1)
            }
        };
    }

    function getThemeName(name) {
        var tid = themeMap[name];
        if (!tid) return null;
        return THEMES.find(function(t) { return t.id === tid; }) || null;
    }

    function switchTab(tab) {
        document.querySelectorAll(".tab-btn").forEach(function(t, i) {
            var tabs = ["scoring", "progress", "ranking"];
            t.className = "tab-btn" + (tabs[i] === tab ? " active" : "");
        });
        document.querySelectorAll(".tab-panel").forEach(function(p) {
            p.style.display = "none";
        });
        var panel = document.getElementById("tab-" + tab);
        if (panel) panel.style.display = "block";
        if (tab === "progress") renderProgress();
        if (tab === "ranking") { showRankingDisabled(); return; }
    }

    async function startScoring() {
        var name = document.getElementById("raterInput").value.trim();
        if (!MEMBERS.includes(name)) {
            showMsg("请输入有效的GNSS算法研发部成员姓名", false);
            return;
        }
        curRater = name;
        document.getElementById("nameSection").style.display = "none";
        document.getElementById("scoringArea").style.display = "block";
        document.getElementById("raterDisplay").textContent = name;
        await loadData();  // 确保最新数据
        renderScoringGrid();
    }

    function doLogout() {
        curRater = "";
        document.getElementById("nameSection").style.display = "block";
        document.getElementById("scoringArea").style.display = "none";
        document.getElementById("raterInput").value = "";
    }

    function renderScoringGrid() {
        var presented = getPresented();
        var others = presented.filter(function(m) { return m !== curRater; });
        var myScored = getMyScored();
        var grid = document.getElementById("scoringGrid");
        var done = 0;
        others.forEach(function(n) { if (myScored[n]) done++; });
        document.getElementById("progressLabel").textContent = done + " / " + others.length + " 已完成";
        var pct = others.length > 0 ? (done / others.length) * 100 : 0;
        document.getElementById("progressBar").style.width = pct + "%";
        if (!others.length) {
            grid.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:60px;grid-column:1/-1;"><p style="font-size:1.2rem;margin-bottom:10px;">暂无可评分的同学</p><p>只有已预约并完成分享的同学才会出现在评分列表中</p><p>请前往「预约系统」完成分享预约</p></div>';
            return;
        }
        var html = "";
        for (var i = 0; i < others.length; i++) {
            var name = others[i];
            var theme = getThemeName(name);
            var entry = myScored[name];
            var tag = theme ? '<span class="theme-tag theme-' + theme.id + '">' + theme.title + '</span>' : "";
            var hint = '<div style="color:#64748b;font-size:0.75rem;margin-bottom:10px;">评分规则：总分 = 内容深度×0.7 + 表达清晰×0.3</div>';
            var action = entry
                ? '<div class="scored-label">已评 ' + ((entry.content_quality||0)*0.7+(entry.presentation_skills||0)*0.3).toFixed(1) + "/" + MAX_TOTAL + '</div>'
                : '<button class="score-btn" onclick="openModal(\'' + name + '\')">打分</button>';
            html += '<div class="score-card' + (entry ? ' scored' : '') + '">'
                + '<div class="score-card-header"><span class="score-card-name">' + name + "</span>" + tag + "</div>"
                + '<div class="score-card-body"><div>' + hint + "</div>" + action + "</div></div>";
        }
        grid.innerHTML = html;
    }

    function openModal(name) {
        curPresenter = name;
        var theme = getThemeName(name);
        document.getElementById("modalTitle").textContent = "给 " + name + " 打分" + (theme ? " - " + theme.title : "");
        curDimScores = {};
        var h = "";
        for (var i = 0; i < DIMS.length; i++) {
            var d = DIMS[i];
            h += '<div class="dim-group"><label>' + d.label + ' <span style="color:#64748b;font-weight:400;font-size:0.8rem;">(' + d.desc + ')</span></label>';
            h += '<div class="score-selector">';
            for (var v = 1; v <= 10; v++) {
                h += '<div class="score-opt" data-dim="' + d.key + '" data-val="' + v + '" onclick="pickDim(\'' + d.key + '\',' + v + ')">' + v + '</div>';
            }
            h += "</div></div>";
        }
        document.getElementById("modalBody").innerHTML = h;
        document.getElementById("modalComment").value = "";
        document.getElementById("modalOverlay").style.display = "flex";
    }

    function pickDim(key, val) {
        curDimScores[key] = val;
        document.querySelectorAll('.score-opt[data-dim="' + key + '"]').forEach(function(el) {
            el.className = "score-opt" + (parseInt(el.getAttribute("data-val")) === val ? " selected" : "");
        });
    }

    function closeModal() {
        document.getElementById("modalOverlay").style.display = "none";
    }

    async function doSubmitScore() {
        for (var i = 0; i < DIMS.length; i++) {
            if (!curDimScores[DIMS[i].key]) {
                showMsg("请完成所有维度的评分", false);
                return;
            }
        }
        try {
            var existing = await supabaseClient.from("presentation_scores").select("id").eq("rater_name", curRater).eq("presenter_name", curPresenter);
            if (existing.data && existing.data.length > 0) {
                showMsg("您已经给该同学打过分了", false);
                return;
            }
            var totalScore = Math.round(curDimScores.content_quality * 0.7 * 10 + curDimScores.presentation_skills * 0.3 * 10) / 10;
            var insertObj = {
                rater_name: curRater,
                presenter_name: curPresenter,
                content_quality: curDimScores.content_quality,
                presentation_skills: curDimScores.presentation_skills,
                score: totalScore,
                comment: document.getElementById("modalComment").value.trim() || null,
                scored_at: new Date().toISOString()
            };
            var result = await supabaseClient.from("presentation_scores").insert([insertObj]);
            if (result.error) throw result.error;
            showMsg("评分提交成功！", true);
            closeModal();
            await loadData();
            renderScoringGrid();
            if (document.querySelector(".tab-btn.active").innerText.includes("进度")) renderProgress();
            if (document.querySelector(".tab-btn.active").innerText.includes("排名")) renderRanking("all");
        } catch (e) {
            showMsg("提交失败: " + e.message, false);
        }
    }

    function renderProgress() { /* 复用原逻辑，根据现有scores变量渲染矩阵 */
        var presented = getPresented();
        var pc = presented.length;
        var tp = pc * (MEMBERS.length - 1);
        var td = scores.filter(function(s) { return presented.indexOf(s.presenter_name) >= 0; }).length;
        var pct = tp > 0 ? ((td / tp) * 100).toFixed(1) : "0";
        document.getElementById("progStats").innerHTML =
            '<div class="stat-box"><div class="val">' + MEMBERS.length + '</div><div class="label">参与人数</div></div>' +
            '<div class="stat-box"><div class="val">' + pc + '</div><div class="label">已分享</div></div>' +
            '<div class="stat-box"><div class="val">' + td + '</div><div class="label">已完成评分</div></div>' +
            '<div class="stat-box"><div class="val">' + pct + '%</div><div class="label">完成率</div></div>';
        var h = '<table class="matrix-table"><thead><tr><th>评分人 → 被评人</th>';
        presented.sort().forEach(function(m) { h += "<th>" + m + "</th>"; });
        h += "</tr></thead><tbody>";
        MEMBERS.forEach(function(rater) {
            h += '<tr><td class="name-cell">' + rater + "</td>";
            presented.forEach(function(presenter) {
                if (rater === presenter) h += '<td class="cell-self">-</td>';
                else {
                    var done = scores.some(function(s) { return s.rater_name === rater && s.presenter_name === presenter; });
                    h += '<td class="' + (done ? "cell-done" : "cell-pending") + '">' + (done ? "✓" : "○") + "</td>";
                }
            });
            h += "</tr>";
        });
        h += "</tbody></table>";
        document.getElementById("progMatrix").innerHTML = h;
        var groups = {};
        presented.forEach(function(name) { var tid = themeMap[name] || 0; if(!groups[tid]) groups[tid]=[]; groups[tid].push(name); });
        var th = "";
        THEMES.forEach(function(theme) {
            var members = groups[theme.id] || [];
            if(!members.length) return;
            var ms = members.map(function(name) {
                var avgObj = getPresenterAvg(name);
                return avgObj ? parseFloat(avgObj.avg) : 0;
            }).filter(function(v){ return v>0;});
            var avg = ms.length ? (ms.reduce(function(a,b){return a+b;},0)/ms.length).toFixed(1) : "--";
            th += '<div class="rank-item"><span class="theme-tag theme-' + theme.id + '" style="margin-right:15px;">' + theme.title + "</span>"
                + '<span style="color:#94a3b8;">' + members.length + "人</span>"
                + '<span style="color:#60a5fa;font-weight:700;margin-left:20px;">组均分: ' + avg + "/" + MAX_TOTAL + "</span></div>";
        });
        document.getElementById("themeStats").innerHTML = th;
    }

    function doFilter(t) { renderRanking(t); }
    function renderRanking(filterTheme) {
        var data = {};
        var presented = getPresented();
        presented.forEach(function(name) {
            var avgObj = getPresenterAvg(name);
            if(!avgObj) return;
            data[name] = {
                avg: parseFloat(avgObj.avg),
                count: avgObj.count,
                theme_id: themeMap[name] || 0,
                dims: avgObj.dims
            };
        });
        var ranking = Object.keys(data).map(function(k){ return { name:k, avg:data[k].avg, count:data[k].count, theme_id:data[k].theme_id, dims:data[k].dims }; });
        if(filterTheme !== "all") ranking = ranking.filter(function(r){ return r.theme_id === parseInt(filterTheme); });
        ranking.sort(function(a,b){ return b.avg - a.avg; });
        var listDiv = document.getElementById("rankList");
        if(!ranking.length) listDiv.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:30px;">暂无评分数据</div>';
        else {
            var h = "";
            for(var i=0;i<ranking.length;i++) {
                var r = ranking[i];
                var theme = THEMES.find(function(t){ return t.id === r.theme_id; });
                var pc = i===0?"top1":i===1?"top2":i===2?"top3":"";
                var tag = theme ? '<span class="theme-tag theme-'+theme.id+' rank-theme">'+theme.title+"</span>" : "";
                h += '<div class="rank-item"><span class="rank-pos '+pc+'">'+(i+1)+'</span><span class="rank-name">'+r.name+'</span>'+tag
                    +'<span class="rank-score">'+r.avg.toFixed(1)+"/"+MAX_TOTAL+'</span>'
                    +'<span class="rank-count">('+r.count+"人评分)</span>"
                    +'<span class="rank-details">内容'+r.dims.content_quality+' | 表达'+r.dims.presentation_skills+'</span></div>';
            }
            listDiv.innerHTML = h;
        }
        var dg = document.getElementById("detailGrid");
        var dh = "";
        for(var j=0;j<Math.min(ranking.length,10);j++) {
            var r2 = ranking[j];
            var theme2 = THEMES.find(function(t){ return t.id===r2.theme_id; });
            var tag2 = theme2 ? '<span class="theme-tag theme-'+theme2.id+'" style="font-size:0.7rem;">'+theme2.title+"</span>" : "";
            dh += '<div class="detail-card"><h4>'+r2.name+" "+tag2+'</h4>'
                + '<div class="detail-row"><span class="dl">总分平均</span><span class="dv">'+r2.avg.toFixed(1)+"/"+MAX_TOTAL+'</span></div>'
                + '<div class="detail-row"><span class="dl">内容深度</span><span class="dv">'+r2.dims.content_quality+'/10</span></div>'
                + '<div class="detail-row"><span class="dl">表达清晰</span><span class="dv">'+r2.dims.presentation_skills+'/10</span></div>'
                + '<div class="detail-row"><span class="dl">评分人数</span><span class="dv">'+r2.count+'/19</span></div></div>';
        }
        dg.innerHTML = dh;
    }

    document.getElementById("modalOverlay").addEventListener("click", function(e) { if(e.target===this) closeModal(); });
    document.addEventListener("DOMContentLoaded", async function() {
        var ok = initSupabase();
        if(!ok) return;
        var connTest = await testBaseConnection();
        if(!connTest) {
            showGlobalError("基础数据库连接失败", "无法连接到 Supabase 数据库，请检查网络或确认 URL/Key 正确。\n当前配置：\nURL: "+localStorage.getItem("supabaseUrl")+"\nKey: "+localStorage.getItem("supabaseKey"));
            return;
        }
        await loadData();
        var dl = document.getElementById("nameList");
        MEMBERS.forEach(function(m){ var o=document.createElement("option"); o.value=m; dl.appendChild(o); });
        if(isDbReady) showMsg("数据库连接成功", true);
    });
    </script>
</body>
</html>
