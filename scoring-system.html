<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 拓边实验室 - 讲演打分系统</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; padding: 20px; background: #1e293b; border-radius: 15px; }
        .header h1 { font-size: 2rem; color: #60a5fa; margin-bottom: 10px; }
        .nav-links { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-btn { padding: 8px 16px; background: rgba(96, 165, 250, 0.1); border: 1px solid #3b82f6; border-radius: 6px; color: #60a5fa; text-decoration: none; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat { background: #1e293b; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 1.5rem; color: #60a5fa; font-weight: bold; }
        .stat-label { color: #94a3b8; font-size: 0.9rem; }
        
        .scoring-form { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #cbd5e1; }
        input, select { width: 100%; padding: 8px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        .presentations { margin-bottom: 30px; }
        .presentation { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 10px; }
        .presentation-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        
        .ranking { background: #1e293b; padding: 20px; border-radius: 15px; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .rank-number { color: #f59e0b; font-weight: bold; }
        
        .footer { text-align: center; margin-top: 30px; padding-top: 15px; border-top: 1px solid #334155; color: #94a3b8; }
        
        .stars { display: flex; gap: 5px; margin: 10px 0; }
        .star { font-size: 1.5rem; cursor: pointer; color: #475569; }
        .star.active { color: #f59e0b; }
        
        @media (max-width: 768px) { 
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 拓边实验室 - 讲演打分系统</h1>
            <p>对讲演者进行打分（1-5分），系统将自动计算平均分并排序。</p>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">返回报名系统</a>
                <a href="presentation-booking-simple.html" class="nav-btn">进入预约系统</a>
            </div>
        </div>

        <div class="stats">
            <div class="stat"><div class="stat-value" id="total-presentations">0</div><div class="stat-label">已讲演人数</div></div>
            <div class="stat"><div class="stat-value" id="total-scores">0</div><div class="stat-label">总评分次数</div></div>
            <div class="stat"><div class="stat-value" id="avg-score">0.0</div><div class="stat-label">平均分</div></div>
        </div>

        <div class="scoring-form">
            <h3>进行打分</h3>
            <div class="form-group">
                <label>评分人姓名</label>
                <input type="text" id="rater-name" placeholder="请输入您的姓名">
            </div>
            <div class="form-group">
                <label>选择讲演者</label>
                <select id="presenter">
                    <option value="">请选择讲演者</option>
                </select>
            </div>
            <div class="form-group">
                <label>评分 (1-5分)</label>
                <div class="stars" id="stars">
                    <span class="star" data-value="1">☆</span>
                    <span class="star" data-value="2">☆</span>
                    <span class="star" data-value="3">☆</span>
                    <span class="star" data-value="4">☆</span>
                    <span class="star" data-value="5">☆</span>
                </div>
                <input type="hidden" id="score" value="0">
            </div>
            <div class="form-group">
                <label>评价意见（可选）</label>
                <input type="text" id="comment" placeholder="请输入评价意见">
            </div>
            <button onclick="submitScore()">提交评分</button>
        </div>

        <div class="presentations">
            <h3>近期讲演记录</h3>
            <div id="presentations-list">
                <!-- 动态生成 -->
            </div>
        </div>

        <div class="ranking">
            <h3>讲演者排名</h3>
            <div id="ranking-list">
                <!-- 动态生成 -->
            </div>
        </div>

        <div class="footer">
            <p>AI 拓边实验室 - 讲演打分系统</p>
            <p>© 2026 算法团队内部活动</p>
        </div>
    </div>

    <script>
        const MEMBERS = [
            "昌胜骐", "陈华炎", "陈玉林", "成余刚", "贺焱", 
            "胡金林", "胡一帆", "计国锋", "蒋伟", "孔超", 
            "刘健", "刘煜", "栾梦杰", "闵于", "钱建军", 
            "王昊俣", "王省超", "吴之祥", "张文宇", "周伟"
        ];
        
        let supabase = null;
        let selectedScore = 0;
        
        function init() {
            const url = localStorage.getItem('supabaseUrl') || 'https://mnxlsewwhczawwyjnexr.supabase.co';
            const key = localStorage.getItem('supabaseKey') || 'sb_publishable_82zAM1g-HhuDUIiYHytK_Q_q4CsUUnu';
            supabase = window.supabase.createClient(url, key);
            
            // 初始化星星评分
            initStars();
            
            // 加载数据
            loadData();
        }
        
        function initStars() {
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const value = parseInt(star.dataset.value);
                    selectedScore = value;
                    document.getElementById('score').value = value;
                    
                    // 更新星星显示
                    stars.forEach((s, index) => {
                        if (index < value) {
                            s.textContent = '★';
                            s.classList.add('active');
                        } else {
                            s.textContent = '☆';
                            s.classList.remove('active');
                        }
                    });
                });
            });
        }
        
        async function loadData() {
            if (!supabase) return;
            
            try {
                // 加载预约数据（确定谁已经讲演过）
                const { data: bookings } = await supabase
                    .from('presentation_bookings')
                    .select('*');
                
                // 加载评分数据
                const { data: scores } = await supabase
                    .from('presentation_scores')
                    .select('*');
                
                updateDisplay(bookings || [], scores || []);
            } catch (err) {
                console.error(err);
            }
        }
        
        function updateDisplay(bookings, scores) {
            // 更新统计
            const presenters = [...new Set(bookings.map(b => b.participant_name))];
            document.getElementById('total-presentations').textContent = presenters.length;
            document.getElementById('total-scores').textContent = scores.length;
            
            // 计算平均分
            const avgScore = scores.length > 0 ? 
                (scores.reduce((sum, s) => sum + s.score, 0) / scores.length).toFixed(1) : '0.0';
            document.getElementById('avg-score').textContent = avgScore;
            
            // 更新讲演者选择
            const presenterSelect = document.getElementById('presenter');
            presenterSelect.innerHTML = '<option value="">请选择讲演者</option>';
            presenters.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                presenterSelect.appendChild(option);
            });
            
            // 显示近期讲演记录
            const presentationsList = document.getElementById('presentations-list');
            presentationsList.innerHTML = '';
            
            // 按周次分组显示
            const weeks = {};
            bookings.forEach(booking => {
                if (!weeks[booking.week_id]) weeks[booking.week_id] = [];
                weeks[booking.week_id].push(booking);
            });
            
            Object.keys(weeks).sort((a, b) => b - a).forEach(weekId => {
                const weekDiv = document.createElement('div');
                weekDiv.className = 'presentation';
                weekDiv.innerHTML = `
                    <div class="presentation-header">
                        <strong>第${weekId}周讲演者</strong>
                        <span>${weeks[weekId].length}人</span>
                    </div>
                    <div>${weeks[weekId].map(b => b.participant_name).join('、')}</div>
                `;
                presentationsList.appendChild(weekDiv);
            });
            
            // 计算并显示排名
            const scoresByPresenter = {};
            scores.forEach(score => {
                if (!scoresByPresenter[score.presenter_name]) {
                    scoresByPresenter[score.presenter_name] = { total: 0, count: 0 };
                }
                scoresByPresenter[score.presenter_name].total += score.score;
                scoresByPresenter[score.presenter_name].count += 1;
            });
            
            // 计算平均分
            const rankings = [];
            for (const [name, data] of Object.entries(scoresByPresenter)) {
                rankings.push({
                    name,
                    average: data.total / data.count,
                    count: data.count
                });
            }
            
            // 按平均分排序
            rankings.sort((a, b) => b.average - a.average);
            
            // 显示排名
            const rankingList = document.getElementById('ranking-list');
            rankingList.innerHTML = '';
            
            if (rankings.length === 0) {
                rankingList.innerHTML = '<div style="color: #94a3b8; text-align: center; padding: 20px;">暂无评分数据</div>';
                return;
            }
            
            rankings.forEach((rank, index) => {
                const rankDiv = document.createElement('div');
                rankDiv.className = 'rank-item';
                rankDiv.innerHTML = `
                    <div>
                        <span class="rank-number">第${index + 1}名</span>
                        <span style="margin-left: 10px;">${rank.name}</span>
                    </div>
                    <div>
                        <span style="color: #f59e0b;">${rank.average.toFixed(1)}分</span>
                        <span style="color: #94a3b8; margin-left: 10px;">(${rank.count}次评分)</span>
                    </div>
                `;
                rankingList.appendChild(rankDiv);
            });
        }
        
        async function submitScore() {
            const raterName = document.getElementById('rater-name').value.trim();
            const presenterName = document.getElementById('presenter').value;
            const score = selectedScore;
            const comment = document.getElementById('comment').value.trim();
            
            if (!raterName || !MEMBERS.includes(raterName)) {
                alert('请输入有效的成员姓名');
                return;
            }
            if (!presenterName) {
                alert('请选择讲演者');
                return;
            }
            if (score < 1 || score > 5) {
                alert('请选择1-5分的评分');
                return;
            }
            if (raterName === presenterName) {
                alert('不能给自己打分');
                return;
            }
            
            try {
                // 检查是否已经给该讲演者打过分
                const { data: existing } = await supabase
                    .from('presentation_scores')
                    .select('id')
                    .eq('rater_name', raterName)
                    .eq('presenter_name', presenterName);
                
                if (existing.length > 0) {
                    alert('您已经给该讲演者打过分了');
                    return;
                }
                
                // 提交评分
                await supabase
                    .from('presentation_scores')
                    .insert([{
                        rater_name: raterName,
                        presenter_name: presenterName,
                        score: score,
                        comment: comment || null,
                        scored_at: new Date().toISOString()
                    }]);
                
                alert('评分提交成功！');
                
                // 清空表单
                document.getElementById('rater-name').value = '';
                document.getElementById('presenter').value = '';
                document.getElementById('comment').value = '';
                selectedScore = 0;
                document.getElementById('score').value = 0;
                
                // 重置星星
                document.querySelectorAll('.star').forEach(star => {
                    star.textContent = '☆';
                    star.classList.remove('active');
                });
                
                // 重新加载数据
                loadData();
                
            } catch (err) {
                alert('提交失败: ' + err.message);
            }
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
